[Config]
; GLDirect Configuration File
; ALL OpenGL versions (1.1-4.6) are translated to Direct3D 9 hardware rendering.
; OpenGL API is provided by Mesa, but actual rendering is done via D3D9 GPU.

; Driver Selection (ALL use D3D9 for rendering):
; 0 = Mesa Software Renderer (CPU-only, slow) - NOT RECOMMENDED
; 1 = Direct3D Software Renderer (software D3D, slow) - NOT RECOMMENDED
; 2 = Direct3D Hardware Renderer (legacy DX9 + Mesa state machine) - BROKEN on modern systems
; 3 = OpenGL 4.6 Core Renderer (modern, self-contained GL->D3D9) - RECOMMENDED
dwDriver=3

; Enable hardware acceleration features
bMipmapping=1
bMultitexture=1
bWaitForRetrace=0
bFullscreenBlit=0
bFastFPU=1
bPersistantDisplay=0
bPersistantResources=0

; Logging settings
dwLogging=1
dwLoggingSeverity=1
LogVerbosity=info
bMessageBoxWarnings=0

; Threading and compatibility
bMultiThreaded=0
bAppCustomizations=1
bHotKeySupport=0
bSplashScreen=0

; Direct3D 9 settings
dwAdapter=0
dwTnL=0
dwMultisample=0